<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2SMARTS PRIVATE LIMITED</title>
    <style>
        /* Apple Style: Clean, White, and Bold */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: #ffffff; color: #1d1d1f; line-height: 1.5; }

        /* Minimal Header */
        header {
            padding: 80px 20px 40px;
            text-align: center;
            background: #f5f5f7; /* Apple's signature light gray */
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.5rem;
            color: #86868b;
            font-weight: 400;
        }

        .container {
            padding: 40px 20px;
            max-width: 800px;
            margin: auto;
        }

        /* Large Clean Sections */
        .section-card {
            margin-bottom: 60px;
            text-align: center;
        }

        .section-card h2 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .section-card p {
            font-size: 1.2rem;
            color: #515154;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        /* Blue Link Button Style */
        .apple-link {
            color: #0066cc;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .apple-link:hover { text-decoration: underline; }

        /* Center Button */
        .cta-button {
            display: inline-block;
            background-color: #0071e3;
            color: white;
            padding: 12px 25px;
            border-radius: 980px; /* Fully rounded like Apple */
            text-decoration: none;
            font-size: 1rem;
            font-weight: 400;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .cta-button:hover { background-color: #0077ed; opacity: 0.9; }

        footer {
            padding: 40px 20px;
            background: #f5f5f7;
            text-align: center;
            font-size: 0.8rem;
            color: #86868b;
            border-top: 1px solid #d2d2d7;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            header p { font-size: 1.1rem; }
            .section-card h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>2SMARTS</h1>
    <p>PVT LTD.</p>
</header>

<div class="container">
    <div class="section-card">
        <h2>Digital Solutions.</h2>
        <p>Innovation that moves your business forward.</p>
        <a href="#" class="apple-link">Learn more ></a>
    </div>

    <div class="section-card">
        <h2>Built for Karachi.</h2>
        <p>Premium services designed for the modern era.</p>
        <a href="https://wa.me/923XXXXXXXXX" class="cta-button">Contact on WhatsApp</a>
    </div>
</div>

<footer>
    <p>© 2026 2SMARTS PRIVATE LIMITED. KARACHI, PAKISTAN.</p>
</footer>

</body>
</html>

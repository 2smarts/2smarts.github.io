<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2SMARTS PVT LTD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; }
        
        body { background-color: #fbfbfd; color: #1d1d1f; -webkit-font-smoothing: antialiased; }

        /* Apple Style Nav Bar */
        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 48px;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        nav span { font-weight: 600; font-size: 14px; letter-spacing: 0.5px; color: #000; }

        /* Hero Section */
        header {
            padding: 120px 20px 60px;
            text-align: center;
            background: #ffffff;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #1d1d1f 0%, #434343 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.4rem;
            color: #86868b;
            font-weight: 500;
            max-width: 300px;
            margin: 0 auto;
        }

        /* Glass Cards Container */
        .container { padding: 20px; max-width: 600px; margin: auto; }

        .pro-card {
            background: #ffffff;
            border-radius: 22px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f0f0f2;
            text-align: center;
        }

        .pro-card:active { transform: scale(0.97); }

        .pro-card i {
            font-size: 2.5rem;
            color: #0066cc;
            margin-bottom: 20px;
        }

        .pro-card h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .pro-card p {
            font-size: 1.1rem;
            color: #515154;
            margin-bottom: 20px;
        }

        /* Apple's Iconic Blue Link */
        .apple-link {
            color: #06c;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* Action Button */
        .buy-btn {
            background: #0071e3;
            color: #fff;
            padding: 12px 28px;
            border-radius: 980px;
            text-decoration: none;
            font-weight: 500;
            font-size: 17px;
            display: inline-block;
            margin-top: 10px;
        }

        footer {
            padding: 60px 20px;
            text-align: center;
            color: #86868b;
            font-size: 0.75rem;
            background: #f5f5f7;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2.8rem; }
            .pro-card h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<nav>
    <span>2SMARTS PRIVATE LIMITED</span>
</nav>

<header>
    <h1>2SMARTS</h1>
    <p>Innovate. Design. Scale.</p>
</header>

<div class="container">
    <div class="pro-card">
        <i class="fab fa-apple"></i>
        <h2>Smart Design.</h2>
        <p>Premium user interfaces built for the future of mobile.</p>
        <a href="#" class="apple-link">Learn more <i class="fas fa-chevron-right" style="font-size: 0.8rem;"></i></a>
    </div>

    <div class="pro-card" style="background: #000; color: #fff; border: none;">
        <i class="fas fa-bolt" style="color: #fff;"></i>
        <h2 style="color: #fff;">Supercharged.</h2>
        <p style="color: #a1a1a6;">Fast, secure, and reliable digital solutions for Karachi.</p>
        <a href="https://wa.me/923XXXXXXXXX" class="buy-btn">Contact Us</a>
    </div>
</div>

<footer>
    <p>Copyright © 2026 2SMARTS PVT LTD. All rights reserved.</p>
</footer>

</body>
</html>

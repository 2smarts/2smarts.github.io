<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2SMARTS PVT LTD | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Hybrid Design: Apple Precision + Samsung Vibrancy */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Samsung One', 'SF Pro Display', sans-serif; }
        
        body { background-color: #ffffff; color: #000000; overflow-x: hidden; }

        /* Samsung Style Bold Header */
        header {
            height: 80vh;
            background: linear-gradient(135deg, #000000 30%, #1c1c1c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Glow (Samsung Style) */
        header::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,113,227,0.15) 0%, transparent 50%);
            animation: move 10s infinite linear;
        }

        @keyframes move { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            z-index: 10;
            text-transform: uppercase;
        }

        header p {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 10px;
            z-index: 10;
            font-weight: 300;
        }

        /* Apple Style Clean Container */
        .container {
            padding: 60px 20px;
            background: #ffffff;
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            margin-top: -40px;
            position: relative;
            z-index: 20;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 40px;
        }

        /* Samsung "Ultra" Cards with Apple "Shadows" */
        .card-grid {
            display: grid;
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .hybrid-card {
            background: #f5f5f7;
            border-radius: 30px;
            padding: 40px 30px;
            transition: transform 0.4s ease;
            text-align: center;
            border: 1px solid transparent;
        }

        .hybrid-card:hover {
            transform: translateY(-10px);
            border-color: #0071e3;
        }

        .hybrid-card i {
            font-size: 3rem;
            background: linear-gradient(90deg, #12c2e9, #c471ed, #f64f59);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .hybrid-card h2 { font-size: 1.8rem; margin-bottom: 10px; }

        /* Floating Contact Button (Samsung Blue) */
        .cta-float {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2167ff;
            color: white;
            padding: 18px 40px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 15px 30px rgba(33, 103, 255, 0.4);
            z-index: 1000;
            width: 80%;
            max-width: 300px;
            text-align: center;
            font-size: 1.1rem;
        }

        footer {
            padding: 100px 20px 150px;
            text-align: center;
            background: #000;
            color: #666;
        }

        /* Mobile View Optimization */
        @media (max-width: 600px) {
            header h1 { font-size: 2.8rem; }
            .section-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>2SMARTS</h1>
    <p>The Future of Innovation.</p>
</header>

<div class="container">
    <h2 class="section-title">Designed for You.</h2>

    <div class="card-grid">
        <div class="hybrid-card">
            <i class="fas fa-microchip"></i>
            <h2>Powerful Tech</h2>
            <p>Samsung-grade performance with Apple-grade simplicity.</p>
        </div>

        <div class="hybrid-card">
            <i class="fas fa-layer-group"></i>
            <h2>Elegant UI</h2>
            <p>Every pixel is crafted with precision and care.</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 2SMARTS PRIVATE LIMITED<br>KARACHI, PAKISTAN</p>
</footer>

<a href="https://wa.me/923XXXXXXXXX" class="cta-float">
    <i class="fab fa-whatsapp"></i> JOIN US NOW
</a>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Collections</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        
        /* Header Jo Yellow Tha */
        h1 { color: #ffcc00; margin-top: 50px; font-size: 2.5rem; text-transform: uppercase; }

        /* Photos ko Line Mein Lane Wala Dabba */
        .photo-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
        }

        /* Har Photo ka Style */
        .photo-card {
            width: 300px; /* Dabbe ki chaudai */
            border: 2px solid #333;
            border-radius: 15px;
            overflow: hidden;
            background: #161b22;
        }

        .photo-card img {
            width: 100%; /* Photo dabbe mein fit rahegi */
            display: block;
        }

        /* Back Button Jo Pehle se tha */
        .back-btn {
            display: inline-block;
            margin-bottom: 50px;
            padding: 12px 30px;
            border: 2px solid #ffcc00;
            color: #ffcc00;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>IPHONE COLLECTIONS</h1>

    <div class="photo-container">
        <div class="photo-card"><img src="ip1.jpg"></div>
        
        <div class="photo-card"><img src="ip2.jpg"></div>
        
        <div class="photo-card"><img src="ip3.jpg"></div>
    </div>

    <a href="index.html" class="back-btn">← BACK TO CATEGORIES</a>

</body>
</html>

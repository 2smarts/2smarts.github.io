<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Inventory | 2SMARTS</title>
    <style>
        body { background: #0a0f1c; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .item-card { background: #161d2f; border: 1px solid #f1c40f; border-radius: 10px; padding: 15px; }
        .item-card img { width: 100%; height: 250px; object-fit: contain; border-radius: 8px; }
        h1 { color: #f1c40f; }
        .back-btn { display: inline-block; margin-top: 20px; color: #f1c40f; text-decoration: none; border: 1px solid #f1c40f; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>IPHONE COLLECTIONS</h1>
    <div class="gallery">
        <div class="item-card">
            <img src="ip1.jpg" alt="iPhone 15">
            <h3>iPhone 15 Pro Max</h3>
        </div>
        <div class="item-card">
            <img src="ip2.jpg" alt="iPhone 14">
            <h3>iPhone 14 Plus</h3>
        </div>
    </div>
    <br>
    <a href="Portal.html" class="back-btn">← Back to Portal</a>
</body>
</html>

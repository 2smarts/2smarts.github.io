<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVIP iPhone Collection</title>
    <style>
        /* TERA ORIGINAL THEME (UI MEHFOOZ HAI) */
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #f0c94d;
            font-size: clamp(2rem, 8vw, 3.5rem); /* Mobile par khud set ho jayega */
            margin: 60px 0 20px;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 3px;
            text-align: center;
        }

        /* VVIP GRID DESIGN */
        .collection-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 40px 20px;
            width: 90%;
            max-width: 1300px;
        }

        /* PREMIUM CARDS */
        .item-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
        }

        .item-card:hover {
            transform: scale(1.05);
            border-color: #f0c94d;
            box-shadow: 0 10px 30px rgba(240, 201, 77, 0.1);
        }

        .item-card img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .item-card h3 {
            color: #f0c94d;
            font-size: 1.1rem;
            margin: 10px 0;
            text-transform: uppercase;
        }

        /* BACK BUTTON (SAME DESIGN) */
        .back-btn {
            border: 2px solid #f0c94d;
            color: #f0c94d;
            padding: 12px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            margin: 50px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #f0c94d;
            color: #0b0e14;
        }
    </style>
</head>
<body>

    <h1>IPHONE COLLECTIONS</h1>

    <div class="collection-container">
        <div class="item-card"><img src="ip17.jpg"><h3>iPhone 17 Pro Max</h3></div>
        <div class="item-card"><img src="ip16.jpg"><h3>iPhone 16 Pro Max</h3></div>
        <div class="item-card"><img src="ip15.jpg"><h3>iPhone 15 Pro Max</h3></div>
        <div class="item-card"><img src="ip14.jpg"><h3>iPhone 14 Pro Max</h3></div>
        <div class="item-card"><img src="ip13.jpg"><h3>iPhone 13 Pro Max</h3></div>
        <div class="item-card"><img src="ip12.jpg"><h3>iPhone 12 Pro Max</h3></div>
        <div class="item-card"><img src="ip11.jpg"><h3>iPhone 11 Pro Max</h3></div>
        <div class="item-card"><img src="ipx.jpg"><h3>iPhone X Edition</h3></div>
        <div class="item-card"><img src="ip8.jpg"><h3>iPhone 8 Plus</h3></div>
        <div class="item-card"><img src="ip7.jpg"><h3>iPhone 7 Plus</h3></div>
    </div>

    <a href="index.html" class="back-btn">← BACK TO CATEGORIES</a>

</body>
</html>

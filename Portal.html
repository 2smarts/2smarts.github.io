        body { margin: 0; padding: 0; background: #0a0f1c; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        h1 { color: #f1c40f; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; text-align: center; }

        .card:hover { background: #f1c40f; color: #000; transform: translateY(-10px); box-shadow: 0 10px 30px rgba(241,196,15,0.4); }
        .card div { font-size: 40px; margin-bottom: 10px; }
        .card h3 { margin: 0; font-size: 18px; }
        .back { margin-top: 50px; color: #888; text-decoration: none; border: 1px solid #444; padding: 10px 20px; border-radius: 50px; }
    </style>
</head>

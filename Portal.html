<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Portal | 2SMARTS PVT LIMITED</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0a0f1c; /* Wahi premium dark theme */
            font-family: 'Segoe UI', sans-serif;
            color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .container { text-align: center; width: 90%; max-width: 1000px; padding: 20px; }
        h1 { color: #f1c40f; font-size: 30px; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .portal-card {
            background: #161d2f;
            border: 2px solid #f1c40f;
            padding: 40px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center;
        }

        .portal-card:hover {
            background: #f1c40f;
            color: #000;
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(241, 196, 15, 0.4);
        }

        .portal-card h3 { margin: 15px 0 5px 0; font-size: 20px; }
        .portal-card p { font-size: 13px; opacity: 0.7; margin: 0; }

        .back-home {
            margin-top: 50px;
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>2SMARTS TRADING PORTAL</h1>
        
        <div class="grid">
            <a href="iphone.html" class="portal-card">
                <div style="font-size: 40px;">📱</div>
                <h3>IPHONE</h3>
                <p>New & Used Models</p>
            </a>

            <a href="samsung.html" class="portal-card">
                <div style="font-size: 40px;">📲</div>
                <h3>SAMSUNG</h3>
                <p>Galaxy Stock Lots</p>
            </a>

            <a href="pixel.html" class="portal-card">
                <div style="font-size: 40px;">🤖</div>
                <h3>GOOGLE PIXEL</h3>
                <p>Pure Android Experience</p>
            </a>

            <a href="others.html" class="portal-card">
                <div style="font-size: 40px;">📦</div>
                <h3>OTHERS</h3>
                <p>Miscellaneous Items</p>
            </a>
        </div>

        <a href="index.html" class="back-home">Back to Main Website</a>
    </div>

</body>
</html>
